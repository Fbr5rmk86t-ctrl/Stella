async function dbSave() {

function getFase(){return fases.find(f=>f.id===state.fase)||fases[0];}

function toggle(key){
  state.checados[key]=!state.checados[key];
  render(); dbSave();
}
function setQty(key,val){
  state.compradas[key]=Math.max(0,val);
  render(); dbSave();
}
function setGasto(key,val){
  const n=parseFloat(val.replace(",","."));
  if(!isNaN(n)&&n>=0) state.gastos[key]=n;
  render(); dbSave();
}

function addPecaCustom(nome,meta,dica){
  if(!state.pecasCustom[state.fase]) state.pecasCustom[state.fase]=[];
  state.pecasCustom[state.fase].push({id:Date.now(),nome,meta:parseInt(meta)||1,dica});
  render(); dbSave();
}
function removePecaCustom(faseId,id){
  state.pecasCustom[faseId]=(state.pecasCustom[faseId]||[]).filter(p=>p.id!==id);
  render(); dbSave();
}

          <div style="margin-top:8px;padding:8px 10px;background:${loc.cor}60;border-radius:8px;font-size:11px;color:${loc.tx};font-style:italic">💡 ${loc.d}</div>
        </div>
      </div>`;
    }).join("")}`;
}
