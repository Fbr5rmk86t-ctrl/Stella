<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saúde & Memórias da Stella 👶</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;background:#f8f4ff;color:#2d1f1f;min-height:100vh}
  button{font-family:Georgia,serif;cursor:pointer}
  input,textarea,select{font-family:Georgia,serif}
  .header{background:linear-gradient(135deg,#e8d5f5,#cde7f8,#d4f0d4);padding:32px 20px 24px;text-align:center;border-bottom:2px solid #ddd0f0}
  .header h1{font-size:24px;font-weight:700;color:#3d1f1f;margin:8px 0 4px}
  .header p{font-size:13px;color:#4a1d7a;font-style:italic}
  .saving{font-size:11px;color:#7a5cb0;margin-top:6px}
  .tabs{overflow-x:auto;background:#fdfaff;border-bottom:2px solid #ddd0f0;display:flex;min-width:max-content;width:100%}
  .tab{padding:12px 15px;border:none;background:transparent;border-bottom:3px solid transparent;cursor:pointer;font-size:11px;color:#888;white-space:nowrap;font-family:Georgia,serif}
  .tab.active{background:#fff;border-bottom-color:#7a5cb0;color:#7a5cb0;font-weight:700}
  .content{max-width:680px;margin:0 auto;padding:20px 14px 80px}
  .card{background:#fff;border-radius:12px;border:1.5px solid #e8d8c8;padding:14px;margin-bottom:12px}
  .chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
  .checkbox{width:20px;height:20px;border-radius:5px;border:2px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;color:#fff;font-weight:700;transition:all 0.2s}
  .checkbox.checked{background:#6abf6a;border-color:#6abf6a}
  .checkbox.round{border-radius:50%}
  .row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 12px}
  .input-field{width:100%;padding:9px 12px;border:1.5px solid #e0d0c0;border-radius:9px;font-size:13px;font-family:Georgia,serif;box-sizing:border-box}
  .btn-primary{padding:11px;background:linear-gradient(135deg,#e8d5f5,#7a5cb0);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;width:100%;cursor:pointer}
  .section-title{font-size:14px;font-weight:700;color:#3d1f1f;margin-bottom:8px;margin-top:16px}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px}
  .alerta{background:#fff5f5;border:1.5px solid #f9c5d1;border-radius:10px;padding:12px 14px;margin-bottom:10px}
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div style="font-size:44px">👶</div>
    <div style="font-size:16px;color:#7a5cb0;font-weight:700">Carregando Saúde & Memórias...</div>
    <div style="font-size:13px;color:#bbb">Buscando seus dados ✨</div>
  </div>
</div>

<script>
const BIN_ID  = "6a1a5edaddf5aa59f7772e85";
const API_KEY = "$2a$10$ZkVpATqG3Rgawpz68Twz6Oj9XcO0sNHdFjh58QL.VUVUtDqRHzx0e";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const H = {"Content-Type":"application/json","X-Master-Key":API_KEY};

let state = {
  aba:"posalta",
  ok:{}, notas:{}, extras:{},
  vacReg:{}, remedios:[],
  dosesDadas:{},
  diario:[], marcosCustom:{}, album:[],
  rForm:{nome:"",dose:"",unidade:"ml",horarios:["08:00"],dias:["seg","ter","qua","qui","sex","sab","dom"],inicio:"",fim:"",obs:""},
  addingR:false, addingFoto:false, addingDiario:false,
  novaFoto:{titulo:"",data:"",desc:"",emoji:"📸"},
  novaDiario:{titulo:"",semana:"",texto:""},
  novoMarco:{mes:"0–1 mês",texto:"",data:""},
  extras:{},
};
let saveTimer=null;

async function dbLoad(){
  try{const r=await fetch(BIN_URL+"/latest",{headers:H});const d=await r.json();return d.record||null;}catch{return null;}
}
async function dbSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    showSaving(true);
    try{
      const r=await fetch(BIN_URL+"/latest",{headers:H});
      const d=await r.json();
      const cur=d.record||{};
      const toSave={ok:state.ok,notas:state.notas,extras:state.extras,vacReg:state.vacReg,remedios:state.remedios,dosesDadas:state.dosesDadas,diario:state.diario,marcosCustom:state.marcosCustom,album:state.album};
      await fetch(BIN_URL,{method:"PUT",headers:H,body:JSON.stringify({...cur,...toSave})});
    }catch{}
    showSaving(false);
  },600);
}
function showSaving(on){const el=document.getElementById("saving-ind");if(el)el.style.display=on?"block":"none";}

// ── DATA ────────────────────────────────────────────────────────────────────
const posAlta=[
  {id:"d1",p:"Dia 1 em casa",e:"🏠",cor:"#f9c5d1",tx:"#7a2d3e",itens:[
    {n:"Observar icterícia (pele/olhos amarelados) — sinal de alerta",t:"alerta",ob:true},
    {n:"Verificar respiração: 30–60 rpm em repouso é normal",t:"cuidado",ob:true},
    {n:"Amamentação: mínimo 8x nas primeiras 24h, verificar pega",t:"cuidado",ob:true},
    {n:"Fraldas molhadas: mínimo 1–2 no 1º dia",t:"cuidado",ob:true},

  ]},
  {id:"m1",p:"1 Mês",e:"🎂",cor:"#f9c5d1",tx:"#7a2d3e",itens:[
    {n:"Consulta pediátrica com 1 mês",t:"consulta",ob:true},
    {n:"Hepatite B — 2ª dose (confirmar esquema)",t:"vacina",ob:true},
    {n:"Foto do 1 mês com cartazinho 📸",t:"marco",ob:false},
  ]},
  {id:"m2",p:"2 Meses",e:"🌿",cor:"#d4f0d4",tx:"#1e5c2e",itens:[
    {n:"Consulta pediátrica com 2 meses",t:"consulta",ob:true},
    {n:"💉 Pentavalente (DTP+Hib+HepB) — 1ª dose",t:"vacina",ob:true},
    {n:"💉 VIP (Polio inativada) — 1ª dose",t:"vacina",ob:true},
    {n:"💉 Pneumo 10 — 1ª dose",t:"vacina",ob:true},
    {n:"💉 Rotavírus — 1ª dose (oral)",t:"vacina",ob:true},
    {n:"Foto do 2 meses 📸",t:"marco",ob:false},
  ]},
  {id:"m3",p:"3 Meses",e:"💙",cor:"#cde7f8",tx:"#0d3d6b",itens:[
    {n:"Consulta pediátrica com 3 meses",t:"consulta",ob:true},
    {n:"💉 Pentavalente — 2ª dose",t:"vacina",ob:true},
    {n:"💉 VIP — 2ª dose",t:"vacina",ob:true},
    {n:"💉 Pneumo 10 — 2ª dose",t:"vacina",ob:true},
    {n:"💉 Rotavírus — 2ª dose (oral — ÚLTIMA dose!)",t:"vacina",ob:true},
    {n:"Foto do 3 meses 📸",t:"marco",ob:false},
  ]},
  {id:"m6",p:"6 Meses 🎉",e:"🎉",cor:"#f9c5d1",tx:"#7a2d3e",itens:[
    {n:"Consulta pediátrica com 6 meses",t:"consulta",ob:true},
    {n:"💉 Influenza (gripe) — 1ª dose",t:"vacina",ob:true},
    {n:"⭐ INÍCIO DA INTRODUÇÃO ALIMENTAR",t:"marco",ob:true},
    {n:"Foto do 6 meses — metade do 1º ano! 📸",t:"marco",ob:false},
  ]},
];

const tipoIcon={consulta:"👩‍⚕️",exame:"🧪",vacina:"💉",cuidado:"🩺",alerta:"⚠️",marco:"⭐",remedio:"💊"};
const tipoCor={consulta:"#cde7f8",exame:"#d4f0d4",vacina:"#e8d5f5",cuidado:"#fde8c8",alerta:"#f9c5d1",marco:"#fffbe8",remedio:"#d4f0d4"};

const vacinas=[
  {n:"BCG",q:"Ao nascer (maternidade)",p:"Tuberculose grave",doses:1,cor:"#f9c5d1"},
  {n:"Hepatite B",q:"Ao nascer + 1 mês + 6 meses",p:"Hepatite B",doses:3,cor:"#fde8c8"},
  {n:"Pentavalente (DTP+Hib+HepB)",q:"2, 4 e 6 meses + reforço 15m",p:"Difteria, Tétano, Coqueluche, Meningite Hib, Hep B",doses:4,cor:"#d4f0d4"},
  {n:"VIP — Polio inativada",q:"2, 4 e 6 meses",p:"Poliomielite",doses:3,cor:"#cde7f8"},
  {n:"Pneumo 10",q:"2 e 4 meses + reforço 12m",p:"Pneumonia, otite, meningite",doses:3,cor:"#e8d5f5"},
  {n:"Rotavírus (oral)",q:"2 e 4 meses — sem 3ª dose!",p:"Gastroenterite grave",doses:2,cor:"#fde8c8"},
  {n:"Meningocócica C",q:"3 e 5 meses + reforço 12m",p:"Meningite C",doses:3,cor:"#f9c5d1"},
  {n:"Influenza (gripe)",q:"A partir dos 6 meses, anual",p:"Gripe sazonal",doses:"anual",cor:"#d4f0d4"},
];

const marcos=[
  {mes:"0–1 mês",e:"🌸",cor:"#f9c5d1",tx:"#7a2d3e",
   fisica:["Reflexos de sucção, preensão e moro","Prefere rostos humanos","Foca objetos a ~25 cm"],
   social:["Reconhece a voz da mamãe","Acalma com colo e voz familiar","Primeiros sons guturais"],
   alerta:["Não suga bem ou perde mais de 10% do peso","Não reage a sons altos","Febre acima de 38°C — emergência"]},
  {mes:"1–2 meses",e:"🌼",cor:"#fde8c8",tx:"#7a4510",
   fisica:["Sustenta cabeça por segundos de bruços","Abre e fecha mãos","Pernas mais ativas"],
   social:["Primeiro sorriso social! 😊","Segue objetos com os olhos","Vocaliza além do choro"],
   alerta:["Não sorri nem com estímulo aos 2 meses","Olhos que desviam muito","Choro inconsolável por mais de 3h/dia"]},
  {mes:"2–3 meses",e:"🌿",cor:"#d4f0d4",tx:"#1e5c2e",
   fisica:["Sustenta bem a cabeça","Tenta virar de lado","Tummy time: levanta cabeça e peito"],
   social:["Ri alto! 😄","Reconhece as mamães claramente","Imita expressões faciais"],
   alerta:["Não sustenta cabeça nem com apoio","Não ri com estímulo","Não segura objetos na mão"]},
  {mes:"3–4 meses",e:"💙",cor:"#cde7f8",tx:"#0d3d6b",
   fisica:["Rola de barriga para as costas","Agarra e sacode objetos","Leva objetos à boca"],
   social:["Ri em gargalhada","Reconhece pessoas conhecidas","Adora espelhos"],
   alerta:["Não tenta alcançar objetos","Não ri nem vocaliza","Cabeça muito instável"]},
  {mes:"4–6 meses",e:"🌟",cor:"#e8d5f5",tx:"#4a1d7a",
   fisica:["Senta com apoio","Transfere objeto de uma mão para outra","Empurra com braços estendidos de bruços"],
   social:["Diz 'bababa'","Reconhece o próprio nome","Curiosidade intensa por tudo","Estranhamento começa"],
   alerta:["Não senta nem com apoio","Não localiza sons","Não demonstra afeto com cuidadoras"]},
];

const hojeStr=new Date().toLocaleDateString("pt-BR");
const hoje=new Date().toLocaleDateString("pt-BR",{weekday:"short"}).replace(".","").toLowerCase().slice(0,3);
const diasLabel={seg:"Seg",ter:"Ter",qua:"Qua",qui:"Qui",sex:"Sex",sab:"Sáb",dom:"Dom"};

// ── ACTIONS ─────────────────────────────────────────────────────────────────
function tog(k){state.ok[k]=!state.ok[k];render();dbSave();}
function setNota(k,v){state.notas[k]=v;dbSave();}
function addExtra(pid,txt){
  if(!txt.trim())return;
  if(!state.extras[pid])state.extras[pid]=[];
  state.extras[pid].push({id:Date.now(),n:txt,t:"custom"});
  render();dbSave();
}
function addVacDose(nome,data,local,obs){
  if(!state.vacReg[nome])state.vacReg[nome]=[];
  state.vacReg[nome].push({data,local,obs});
  render();dbSave();
}
function addRemedio(r){state.remedios.push({...r,id:Date.now(),ativo:true});render();dbSave();}
function toggleRemedioAtivo(id){
  state.remedios=state.remedios.map(r=>r.id===id?{...r,ativo:!r.ativo}:r);
  render();dbSave();
}
function removeRemedio(id){state.remedios=state.remedios.filter(r=>r.id!==id);render();dbSave();}
function marcarDose(rid,h){
  const k=`${rid}-${hojeStr}-${h}`;
  state.dosesDadas[k]=!state.dosesDadas[k];
  render();dbSave();
}
function addDiario(titulo,semana,texto){
  if(!texto.trim())return;
  state.diario.unshift({id:Date.now(),titulo:titulo||"Momento especial",semana,texto,data:hojeStr});
  state.addingDiario=false;render();dbSave();
}
function addMarco(mes,texto,data){
  if(!texto.trim())return;
  if(!state.marcosCustom[mes])state.marcosCustom[mes]=[];
  state.marcosCustom[mes].push({id:Date.now(),texto,data});
  render();dbSave();
}
function addFoto(titulo,data,desc,emoji){
  if(!titulo.trim())return;
  state.album.unshift({id:Date.now(),titulo,data:data||hojeStr,desc,emoji});
  state.addingFoto=false;render();dbSave();
}
function setAba(a){state.aba=a;render();}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML=buildApp();
}

function buildApp(){
  const abas=[
    {id:"posalta",l:"📋 Pós-Alta"},{id:"vacinas",l:"💉 Vacinas"},
    {id:"remedios",l:"💊 Remédios"},{id:"marcos",l:"⭐ Marcos"},
    {id:"diario",l:"📖 Diário"},{id:"album",l:"📸 Álbum"},
  ];
  return `
    <div class="header">
      <div style="font-size:38px">👶</div>
      <h1>Saúde & Memórias da Stella</h1>
      <p>Do nascimento aos 6 meses — e além</p>
      <div id="saving-ind" class="saving" style="display:none">💾 Salvando...</div>
    </div>
    <div class="tabs">
      ${abas.map(a=>`<button class="tab${state.aba===a.id?" active":""}" onclick="setAba('${a.id}')">${a.l}</button>`).join("")}
    </div>
    <div class="content">
      ${state.aba==="posalta"?buildPosAlta():""}
      ${state.aba==="vacinas"?buildVacinas():""}
      ${state.aba==="remedios"?buildRemedios():""}
      ${state.aba==="marcos"?buildMarcos():""}
      ${state.aba==="diario"?buildDiario():""}
      ${state.aba==="album"?buildAlbum():""}
    </div>`;
}

function buildPosAlta(){
  return posAlta.map(p=>{
    const ext=state.extras[p.id]||[];
    const all=[...p.itens,...ext.map(e=>({n:e.n,t:"custom",ob:false,_id:e.id}))];
    const done=all.filter(i=>state.ok[`pa-${p.id}-${i.n}`]).length;
    return `<div style="margin-bottom:20px">
      <div style="background:${p.cor};border-radius:12px 12px 0 0;padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:700;color:${p.tx}">${p.e} ${p.p}</span>
        <span style="font-size:11px;color:${p.tx};opacity:0.8">${done}/${all.length}</span>
      </div>
      <div style="border:1.5px solid ${p.cor};border-top:none;border-radius:0 0 12px 12px;overflow:hidden">
        ${all.map(it=>{
          const k=`pa-${p.id}-${it.n}`;const ch=!!state.ok[k];
          const nk=`nota-${k}`;
          return `<div style="border-bottom:1px solid #f5ede5;background:${ch?"#f5fbf5":"#fff"}">
            <div class="row" onclick="tog('${k}')">
              <div class="checkbox${ch?" checked":""}">✓</div>
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  <span style="font-size:12px;text-decoration:${ch?"line-through":"none"};color:${ch?"#aaa":"#2d1f1f"}">${it.n}</span>
                  ${it.t&&it.t!=="custom"?`<span class="chip" style="background:${tipoCor[it.t]||"#eee"};color:#555">${tipoIcon[it.t]} ${it.t}</span>`:""}
                  ${it.ob&&!ch?`<span class="chip" style="background:#f9c5d1;color:#7a2d3e">OBRIGATÓRIO</span>`:""}
                </div>
              </div>
            </div>
            <div style="padding:0 14px 10px 44px">
              <input placeholder="+ anotar data / observação" value="${(state.notas[nk]||"").replace(/"/g,"&quot;")}" onchange="setNota('${nk}',this.value)" style="width:100%;padding:4px 9px;border:1px dashed #ddd;border-radius:7px;font-size:11px;font-family:Georgia,serif;color:#7a5cb0">
            </div>
          </div>`;
        }).join("")}
        <div style="padding:10px 14px;background:#fdfbf8">
          <input placeholder="+ adicionar item neste período" onkeydown="if(event.key==='Enter'&&this.value.trim()){addExtra('${p.id}',this.value.trim());this.value=''}" style="width:100%;padding:7px 10px;border:1px dashed #ddd;border-radius:8px;font-size:12px;font-family:Georgia,serif;color:#aaa">
          <div style="font-size:10px;color:#ccc;margin-top:3px">Pressione Enter para adicionar</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function buildVacinas(){
  return `
    <div style="background:#e8d5f5;border-radius:12px;padding:13px;margin-bottom:18px;font-size:12px;color:#4a1d7a;line-height:1.65">
      💉 Registre data, local e dose de cada vacina. Confirme o esquema com a pediatra.
    </div>
    ${vacinas.map(v=>{
      const reg=state.vacReg[v.n]||[];
      const done=reg.length;
      const dosesN=typeof v.doses==="number"?v.doses:"?";
      return `<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
        <div style="background:${v.cor};padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:700">💉 ${v.n}</span>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:10px;background:rgba(255,255,255,0.6);padding:2px 8px;border-radius:10px;color:#555">${done}/${dosesN}</span>
            ${done>=dosesN&&typeof dosesN==="number"?`<span style="font-size:10px;background:#6abf6a;color:#fff;padding:2px 8px;border-radius:10px;font-weight:700">✓ Completa</span>`:""}
          </div>
        </div>
        <div style="padding:12px 14px">
          <div style="font-size:11px;color:#888;margin-bottom:3px">🕐 ${v.q}</div>
          <div style="font-size:11px;color:#888;margin-bottom:10px">🛡️ ${v.p}</div>
          ${reg.map((r,i)=>`<div style="background:#f0f8f0;border:1.5px solid #6abf6a;border-radius:9px;padding:9px 12px;margin-bottom:7px">
            <div style="font-size:11px;font-weight:700;color:#1e5c2e;margin-bottom:4px">✅ Dose ${i+1}</div>
            ${r.data?`<div style="font-size:11px;color:#555">📅 ${r.data}</div>`:""}
            ${r.local?`<div style="font-size:11px;color:#555">📍 ${r.local}</div>`:""}
            ${r.obs?`<div style="font-size:11px;color:#888">📝 ${r.obs}</div>`:""}
          </div>`).join("")}
          <div id="vac-form-${v.n.replace(/\W/g,"_")}" style="display:none;margin-top:8px">
            <input id="vd-${v.n.replace(/\W/g,"_")}" placeholder="Data (ex: 15/03/2025)" class="input-field" style="margin-bottom:7px">
            <input id="vl-${v.n.replace(/\W/g,"_")}" placeholder="Local (UBS, hospital...)" class="input-field" style="margin-bottom:7px">

(async()=>{
  const d=await dbLoad();
  if(d){
    if(d.ok)           state.ok=d.ok;
    if(d.notas)        state.notas=d.notas;
    if(d.extras)       state.extras=d.extras;
    if(d.vacReg)       state.vacReg=d.vacReg;
    if(d.remedios)     state.remedios=d.remedios;
    if(d.dosesDadas)   state.dosesDadas=d.dosesDadas;
    if(d.diario)       state.diario=d.diario;
    if(d.marcosCustom) state.marcosCustom=d.marcosCustom;
    if(d.album)        state.album=d.album;
  }
  render();
})();
</script>
